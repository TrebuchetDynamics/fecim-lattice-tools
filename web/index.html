<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FeCIM Lattice Tools (Web Demo)</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; }
      #status { padding: 12px 16px; background: #111; color: #eee; font-size: 14px; }
      #status code { color: #9ff; }
    </style>
  </head>
  <body>
    <div id="status">Loading <code>fecim.wasm</code>… (this is a Fyne WASM demo)</div>
    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go();
      WebAssembly.instantiateStreaming(fetch("fecim.wasm"), go.importObject)
        .then((result) => {
          document.getElementById("status").textContent = "Running FeCIM web demo…";
          go.run(result.instance);
        })
        .catch((err) => {
          document.getElementById("status").textContent = "WASM load failed: " + err;
          console.error(err);
        });
    </script>
  </body>
</html>
