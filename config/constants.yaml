# FeCIM Lattice Tools - Global Constants
# Reference index defined in config/materials.yaml

# =============================================================================
# GLOBAL CONSTANTS
# =============================================================================
constants:
  fecim_levels: 30              # Discrete analog states ("30 discrete states" - Dr. Tour)
  bits_per_cell: 4.91           # log2(30) = 4.91 bits/cell
  boltzmann_ev: 8.617e-5        # Boltzmann constant (eV/K)
  epsilon_0: 8.854e-12          # Vacuum permittivity (F/m)
  room_temperature: 300         # Standard room temperature (K)
