name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Calibration drift guard
        run: scripts/calib-guard.sh
        env:
          # To intentionally update calibrations, set this repo variable to "1"
          # (GitHub Settings → Secrets and variables → Actions → Variables).
          ALLOW_CALIBRATION_UPDATES: ${{ vars.ALLOW_CALIBRATION_UPDATES }}

      - run: go test -tags=ci ./...
